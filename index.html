<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATAS Market Research | Ultra Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070B14;
            --hdr: #121822;
            --brd: #1F2937;
            --txt: #D1D5DB;
            --up: #10B981;
            --dn: #EF4444;
            --cyn: #00FFFF;
            --poc: #2962FF;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: var(--bg);
            color: var(--txt);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        header {
            height: 38px;
            background: var(--hdr);
            border-bottom: 2px solid #1A212E;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; font-size: 11px; user-select: none;
        }

        .toolset { display: flex; align-items: center; gap: 15px; color: #9CA3AF; }
        .toolset b { color: #FFF; margin-right: 4px; }
        
        .atas-input, .atas-select {
            background: #1F2937; border: 1px solid #374151; color: #FFF;
            font-size: 11px; padding: 2px 6px; width: 90px;
            outline: none; font-weight: bold; text-transform: uppercase;
        }
        .atas-select { cursor: pointer; color: #00FFFF; width: auto; font-size: 10px; padding: 1px 4px; border-color: #4B5563; }

        .price-badge-live { font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 16px; padding-right: 40px; }
        main { flex: 1; display: flex; position: relative; overflow: hidden; }
        #viewport { flex: 1; position: relative; display: flex; flex-direction: column; cursor: crosshair; }
        #scale-right { width: 85px; background: #0A0F17; border-left: 1px solid #1E293B; position: relative; cursor: ns-resize; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #price-badge { position: absolute; right: 0; background: var(--dn); color: #FFF; font-family: 'Roboto Mono', monospace; font-size: 11px; padding: 2px 6px; transform: translateY(-50%); width: 83px; text-align: right; z-index: 200; border-radius: 2px 0 0 2px; pointer-events: none; }
        .status-ohlc { position: absolute; top: 12px; left: 15px; font-family: 'Roboto Mono', monospace; font-size: 10px; color: #94A3B8; pointer-events: none; }
        #bottom-axis { height: 26px; background: #090D14; border-top: 1px solid #1E293B; cursor: ew-resize; }
        #loader { position: absolute; inset: 0; background: #070B14; display: flex; align-items: center; justify-content: center; z-index: 1000; font-weight: bold; }
        
        #drawing-toolbar { position: absolute; left: 10px; top: 100px; display: flex; flex-direction: column; gap: 8px; z-index: 500; background: rgba(18, 24, 34, 0.8); padding: 8px; border: 1px solid #1E293B; border-radius: 4px; border-left: 2px solid #00FFFF; user-select: none; }
        .draw-btn { width: 32px; height: 32px; background: #1F2937; border: 1px solid #374151; color: #FFF; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; border-radius: 2px; }
        .draw-btn:hover, .draw-btn.active { background: #00FFFF; color: #000; border-color: #00FFFF; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }

        #oi-resizer {
            height: 4px;
            background: #1E293B;
            cursor: ns-resize;
            flex-shrink: 0;
            z-index: 100;
        }
        #oi-resizer:hover, #oi-resizer.active {
            background: #00FFFF;
        }
        #oi-panel-wrap, #vspd-panel-wrap {
            height: 120px;
            position: relative;
            background: #060A12;
            flex-shrink: 0;
            overflow: hidden;
        }
        #oi-panel-wrap canvas, #vspd-panel-wrap canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        #vspd-panel-wrap { height: 100px; background: #05080E; }
        
        #stats-panel-wrap {
            height: 100px;
            position: relative;
            background: #060A12;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            border-top: 1px solid #1E293B;
        }
        #stats-panel-wrap canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            image-rendering: pixelated;
        }
        #vspd-resizer {
            height: 4px; background: #1E293B; cursor: ns-resize; flex-shrink: 0; z-index: 100;
        }
        #vspd-resizer:hover, #vspd-resizer.active { background: #FF00FF; }

        /* --- MTF Heatmap HUD --- */
        #tf-heatmap-hud {
            position: absolute;
            bottom: 40px;
            left: 170px; /* Offset from Left Profile */
            display: flex;
            gap: 6px;
            padding: 8px;
            background: rgba(12, 18, 28, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            z-index: 600;
            user-select: none;
            transition: 0.3s;
            pointer-events: none;
        }
        .tf-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 40px;
            background: rgba(31, 41, 55, 0.5);
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tf-cell.bull { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 8px rgba(16, 185, 129, 0.1); }
        .tf-cell.bear { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 8px rgba(239, 68, 68, 0.1); }
        .tf-cell.neut { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); }
        
        .tf-label { font-size: 8px; font-weight: bold; color: #94A3B8; margin-bottom: 2px; }
        .tf-status { font-size: 10px; font-weight: bold; font-family: 'Roboto Mono', monospace; }
        .tf-status.bull { color: #10B981; }
        .tf-status.bear { color: #EF4444; }
        .tf-status.neut { color: #F59E0B; }

        /* ===== MOBILE RESPONSIVE ===== */
        #bottom-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(12,18,28,0.97);
            backdrop-filter: blur(16px);
            border-top: 1px solid #1E293B;
            z-index: 2000;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            padding: 0 8px;
        }
        .bnav-btn {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 3px;
            background: none; border: none;
            color: #6B7280; cursor: pointer;
            padding: 6px 16px;
            border-radius: 10px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-width: 60px;
        }
        .bnav-btn.active { color: #00FFFF; background: rgba(0,255,255,0.08); }
        .bnav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
        .bnav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

        #sheet-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2500;
            backdrop-filter: blur(4px);
        }
        #bottom-sheet {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0D1421;
            border-top: 1px solid #1E293B;
            border-radius: 20px 20px 0 0;
            z-index: 3000;
            padding: 0 0 env(safe-area-inset-bottom);
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
        }
        #bottom-sheet.open { transform: translateY(0); }
        .sheet-handle {
            width: 36px; height: 4px;
            background: #374151; border-radius: 2px;
            margin: 12px auto 0;
        }
        .sheet-title {
            text-align: center;
            font-size: 13px; font-weight: 700;
            color: #94A3B8;
            padding: 10px 0 14px;
            border-bottom: 1px solid #1E293B;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .sheet-content {
            padding: 14px 16px 20px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .sheet-section-title {
            font-size: 10px; font-weight: 700;
            color: #4B5563; letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 14px 0 8px;
        }
        .sheet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .sheet-toggle {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px;
            padding: 10px 6px;
            background: #131C2B;
            border: 1px solid #1E293B;
            border-radius: 10px;
            cursor: pointer;
            color: #6B7280;
            font-size: 10px; font-weight: 700;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.5px;
        }
        .sheet-toggle.on {
            background: rgba(0,255,255,0.08);
            border-color: #00FFFF;
            color: #00FFFF;
        }
        .sheet-toggle .st-icon { font-size: 18px; line-height: 1; }

        .sheet-tf-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-top: 4px;
        }
        .sheet-tf-btn {
            flex: 1; min-width: 60px;
            padding: 10px 4px;
            background: #131C2B;
            border: 1px solid #1E293B;
            border-radius: 10px;
            color: #94A3B8;
            font-size: 13px; font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sheet-tf-btn.active {
            background: rgba(0,255,255,0.1);
            border-color: #00FFFF;
            color: #00FFFF;
        }

        .sheet-sym-row {
            display: flex; gap: 8px; margin-top: 4px;
        }
        .sheet-sym-input {
            flex: 1;
            background: #131C2B;
            border: 1px solid #374151;
            border-radius: 10px;
            color: #FFF;
            font-size: 15px; font-weight: 700;
            padding: 11px 14px;
            text-transform: uppercase;
            outline: none;
        }
        .sheet-sym-go {
            background: #00FFFF;
            color: #000;
            font-weight: 700;
            font-size: 13px;
            border: none;
            border-radius: 10px;
            padding: 0 20px;
            cursor: pointer;
        }

        @media (max-width: 767px) {
            #bottom-nav { display: flex; }
            body { padding-bottom: 56px; }
            body, html { overflow: hidden; }

            header { height: 48px; padding: 0 12px; }
            header .toolset > div:not(:first-child):not(:last-child) { display: none; }
            header .toolset > div:last-child { display: none; }
            #drawing-toolbar { display: none; }
            #tf-heatmap-hud { display: none !important; }
            #oi-panel-wrap, #oi-resizer, #vspd-panel-wrap, #vspd-resizer { display: none !important; }
            #scale-right { width: 60px; }

            .price-badge-live { font-size: 18px; }
            .atas-input { font-size: 13px; width: 110px; }

            #mobile-menu-btn {
                display: flex !important;
                align-items: center; justify-content: center;
                width: 36px; height: 36px;
                background: #1F2937;
                border: 1px solid #374151;
                border-radius: 8px;
                color: #FFF;
                font-size: 20px;
                cursor: pointer;
                margin-left: 6px;
            }
            #bottom-sheet { display: block; }
            #sheet-overlay { display: block; }
        }
        @media (min-width: 768px) {
            #mobile-menu-btn { display: none !important; }
            #bottom-nav { display: none !important; }
        }
    </style>
</head>
<body>
    <header>
        <div class="toolset">
            <div style="display:flex; align-items:center;">
                <b>SYMBOL:</b>
                <input type="text" id="symbol-input" class="atas-input" value="BTCUSDT" spellcheck="false">
            </div>
            <div style="display:flex; align-items:center;">
                <b>TICK:</b>
                <input type="text" id="tick-input" class="atas-input" value="5.0" style="width:65px; margin-right:5px;">
                <button id="auto-tick-btn" class="draw-btn" style="width:24px; height:22px; font-size:10px; margin-right:5px;" title="Auto Tick">A</button>
                <select id="density-select" class="atas-select"></select>
            </div>
            <div style="display:flex; align-items:center;">
                <b>PERIOD:</b>
                <select id="tf-select" class="atas-select" style="margin-right:15px;">
                    <option value="1m">1m</option>
                    <option value="5m">5m</option>
                    <option value="15m">15m</option>
                    <option value="1h">1h</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; gap:5px;">
                <button id="imb-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Diagonal Imbalance">IMB</button>
                <button id="stk-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Stacked Imbalance">STK</button>
                <button id="heat-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Liquidity Heatmap">HEAT</button>
                <button id="delta-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Delta Histogram">DELTA</button>
                <button id="whale-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Aggressive Whale Bubbles">WHALE</button>
                <button id="glow-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Glowing DOM Walls">GLOW</button>
                <button id="foot-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Bid/Ask Footprint">FOOT</button>
                <button id="stats-table-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 6px;" title="Bottom Stats Table">STATS</button>
                <input type="text" id="whale-thres-input" class="atas-input" value="10.0" style="width:40px; font-size:9px;" title="Whale BTC Threshold">

                <button id="jump-24h-btn" class="draw-btn" style="font-size:9px; width:auto; padding:0 12px; color:#00FFFF; border-color:#00FFFF; margin-left: 10px;" title="Jump 24H Back">24H BACK</button>
                <button id="go-live-btn" class="draw-btn active" style="font-size:9px; width:auto; padding:0 12px; color:#10B981; border-color:#10B981;" title="Jump to Live">LIVE</button>
            </div>
            <div style="color:#FFF;">Market Research | <span style="color:#00FFFF;">Institutional TPO</span></div>
        </div>
        <div id="hdr-p" class="price-badge-live">00.00</div>
        <button id="mobile-menu-btn" style="display:none;" onclick="openSheet('ind')">&#9776;</button>
    </header>

    <!-- Bottom Navigation Bar -->
    <div id="bottom-nav">
        <button class="bnav-btn active" id="bnav-chart" onclick="switchTab('chart')">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span class="bnav-label">CHART</span>
        </button>
        <button class="bnav-btn" id="bnav-ind" onclick="openSheet('ind')">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            <span class="bnav-label">TOOLS</span>
        </button>
        <button class="bnav-btn" id="bnav-tf" onclick="openSheet('tf')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span class="bnav-label">TF</span>
        </button>
        <button class="bnav-btn" id="bnav-sym" onclick="openSheet('sym')">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="bnav-label">SYMBOL</span>
        </button>
    </div>

    <!-- Sheet Overlay -->
    <div id="sheet-overlay" style="display:none;" onclick="closeSheet()"></div>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheet-title">INDICATORS</div>
        <div class="sheet-content">

            <!-- INDICATORS TAB -->
            <div id="tab-ind">
                <div class="sheet-section-title">Order Flow</div>
                <div class="sheet-grid">
                    <div class="sheet-toggle on" id="st-imb" onclick="sheetToggle('showImb','imb-btn',this)"><span class="st-icon">⚡</span>IMB</div>
                    <div class="sheet-toggle on" id="st-stk" onclick="sheetToggle('showStk','stk-btn',this)"><span class="st-icon">🔗</span>STACKED</div>
                    <div class="sheet-toggle on" id="st-heat" onclick="sheetToggle('showHeat','heat-btn',this)"><span class="st-icon">🌡️</span>HEAT</div>
                    <div class="sheet-toggle on" id="st-delta" onclick="sheetToggle('showDelta','delta-btn',this)"><span class="st-icon">Δ</span>DELTA</div>
                    <div class="sheet-toggle on" id="st-whale" onclick="sheetToggle('showWhale','whale-btn',this)"><span class="st-icon">🐋</span>WHALE</div>
                    <div class="sheet-toggle on" id="st-glow" onclick="sheetToggle('showGlowWalls','glow-btn',this)"><span class="st-icon">✨</span>GLOW</div>
                    <div class="sheet-toggle on" id="st-foot" onclick="sheetToggle('showFootprint','foot-btn',this)"><span class="st-icon">📊</span>FOOT</div>
                    <div class="sheet-toggle on" id="st-stats" onclick="sheetToggle('showStatsTable','stats-table-btn',this)"><span class="st-icon">📑</span>STATS</div>
                </div>

            </div>

            <!-- TF TAB -->
            <div id="tab-tf" style="display:none;">
                <div class="sheet-section-title">Timeframe</div>
                <div class="sheet-tf-row">
                    <div class="sheet-tf-btn" onclick="setMobileTF('1m',this)">1m</div>
                    <div class="sheet-tf-btn" onclick="setMobileTF('5m',this)">5m</div>
                    <div class="sheet-tf-btn" onclick="setMobileTF('15m',this)">15m</div>
                    <div class="sheet-tf-btn" onclick="setMobileTF('1h',this)">1h</div>
                </div>
            </div>

            <!-- SYMBOL TAB -->
            <div id="tab-sym" style="display:none;">
                <div class="sheet-section-title">Symbol</div>
                <div class="sheet-sym-row">
                    <input class="sheet-sym-input" id="mobile-sym-input" placeholder="e.g. BTCUSDT" spellcheck="false">
                    <button class="sheet-sym-go" onclick="changeMobileSymbol()">GO</button>
                </div>
                <div class="sheet-section-title" style="margin-top:18px;">Quick Select</div>
                <div class="sheet-tf-row">
                    <div class="sheet-tf-btn" onclick="quickSym('BTCUSDT')">BTC</div>
                    <div class="sheet-tf-btn" onclick="quickSym('ETHUSDT')">ETH</div>
                    <div class="sheet-tf-btn" onclick="quickSym('SOLUSDT')">SOL</div>
                    <div class="sheet-tf-btn" onclick="quickSym('XRPUSDT')">XRP</div>
                    <div class="sheet-tf-btn" onclick="quickSym('BNBUSDT')">BNB</div>
                    <div class="sheet-tf-btn" onclick="quickSym('DOGEUSDT')">DOGE</div>
                </div>
            </div>

        </div>
    </div>
    <main>
        <div id="viewport">
            <div id="drawing-toolbar">
                <button class="draw-btn active" id="tool-cursor" title="Cursor">↖</button>
                <button class="draw-btn" id="tool-hline" title="Horizontal Line">⎯</button>
                <button class="draw-btn" id="tool-box" title="Box Area">⃞</button>
                <button class="draw-btn" id="tool-clear" title="Clear All" style="margin-top:10px; color:#EF4444; border-color:#EF4444;">⟲</button>
            </div>
            <div class="status-ohlc" id="ohlc-info">Calibrating Market...</div>
            <div id="loader">ULTRA PRECISION ENGINE...</div>
            <div style="flex:1; position:relative; min-height:0;"><canvas id="main-c"></canvas></div>
            <div id="stats-panel-wrap"><canvas id="stats-c"></canvas></div>
            <div id="tf-heatmap-hud"></div>
            <div id="bottom-axis"><canvas id="time-c"></canvas></div>
        </div>
        <div id="scale-right">
            <canvas id="scale-c"></canvas>
            <div id="price-badge">0.00</div>
        </div>
    </main>

    <script>
        const SETTINGS = { symbol:'BTCUSDT', tick:5.0, autoTick:true, rowH:26, pxMin:120, profW:160, domW:180, period:1800000, tf:'1m', tfMs:60000, resTol:1.0, resThres:0.75, showImb:true, showDelta:true, showWhale:true, showGlowWalls:true, showHeat:true, showStk:true, showStatsTable:true, showOI:true, showCVD:true, showDOI:true, showLiq:true, showTrend:true, showTIndex:true, showTFHeatmap:true, showFootprint:true, whaleThres: 10.0, stackedZones: [], heatMap: [] };
        const THEME = { bg:'#070B14', grid:'#101721', vBase:'41, 108, 255', poc:'rgba(41, 138, 255, 0.4)', up:'#10B981', dn:'#EF4444', cyn:'#00FFFF', tpo:'#8A2BE2', hvY:'rgba(255, 235, 59, 0.35)', hvR:'rgba(239, 68, 68, 0.35)', drawings: '#8A2BE2', resZone: 'rgba(138, 43, 226, 0.15)', imbU: '#FFD700', imbD: '#FF4500', heatUp: 'rgba(16, 185, 129, 0.05)', heatDn: 'rgba(239, 68, 68, 0.05)', oi: '#00FFFF', cvd: '#FFA500', doiUp: '#10B981', doiDn: '#EF4444', liq: '#FF00FF' };
        
        let dpr = window.devicePixelRatio || 1;
        const STATES = {};

        function initState(sym) {
            if (!STATES[sym]) {
                STATES[sym] = {
                    bars: [], profile: { v: {}, max: 0, poc: 0 }, tradeCache: [], oiCache: [], vSpdCache: [],
                    orderBook: { b: {}, a: {}, rawB: {}, rawA: {}, max: 0 },
                    lastP: 0, scrollY: 0, scrollX: 0, zoomX: 1, zoomY: 0.8, lastTotalV: 0,
                    ws: null, heatMap: [], reconnectTimer: null, tf: '', tfBars: {}, baseTick: null
                };
            }
            return STATES[sym];
        }

        function recalcProfile(sym) {
            const state = STATES[sym];
            if(!state) return;
            state.profile = { v: {}, max: 0, poc: 0 };
            state.bars.forEach(b => {
                Object.keys(b.vAP).forEach(p => {
                    const v = b.vAP[p].t;
                    state.profile.v[p] = (state.profile.v[p] || 0) + v;
                    if(state.profile.v[p] > state.profile.max) { 
                        state.profile.max = state.profile.v[p]; 
                        state.profile.poc = +p; 
                    }
                });
            });
        }


        let mouseX = 0, mouseY = 0;
        let drawings = [], activeTool = 'cursor', isDrawing = false, startP, startT;
        
        const mainC = document.getElementById('main-c'), scaleC = document.getElementById('scale-c'), timeC = document.getElementById('time-c'), statsC = document.getElementById('stats-c');
        const ctx = mainC.getContext('2d'), sctx = scaleC.getContext('2d'), tctx = timeC.getContext('2d'), stctx = statsC.getContext('2d');
        let w, h, sw, sh, tw, th, stw, sth;

        async function init(newSymbol = SETTINGS.symbol, newTick = null) {
            const sym = newSymbol.toUpperCase();
            SETTINGS.symbol = sym;
            let state = STATES[sym];
            if (!state) { state = initState(sym); STATES[sym] = state; }
            
            if(newTick === null) {
                if(SETTINGS.symbol.includes('BTC')) { SETTINGS.tick = 5.0; SETTINGS.whaleThres = 25.0; }
                else if(SETTINGS.symbol.includes('ETH')) { SETTINGS.tick = 0.5; SETTINGS.whaleThres = 200.0; }
                else if(SETTINGS.symbol.includes('XRP') || SETTINGS.symbol.includes('PEPE')) { SETTINGS.tick = 0.001; SETTINGS.whaleThres = 500000.0; }
                else { SETTINGS.tick = 0.01; SETTINGS.whaleThres = 10000.0; }
                document.getElementById('whale-thres-input').value = SETTINGS.whaleThres;
            } else {
                SETTINGS.tick = parseFloat(newTick);
            }
            
            document.getElementById('symbol-input').value = SETTINGS.symbol;
            document.getElementById('tick-input').value = SETTINGS.tick;
            document.getElementById('tf-select').value = SETTINGS.tf;

            window.addEventListener('resize', resize); resize();
            setTimeout(resize, 100); // Secondary resize to ensure correct dimensions
            updatePresets(SETTINGS.symbol);

            let isNewSymbol = false;
            if (state.baseTick === null) isNewSymbol = true;

            if (state.baseTick !== SETTINGS.tick) {
                // Tick density changed! We MUST clear cached aggregations to avoid overlaps.
                state.tfBars = {};
                state.bars = [];
                state.baseTick = SETTINGS.tick;
            }

            if (!state.tfBars) state.tfBars = {};
            
            if (state.bars.length === 0 || state.tf !== SETTINGS.tf) {
                state.tf = SETTINGS.tf;
                document.getElementById('loader').style.display='flex';

                if (SETTINGS.tf === '1m') state.zoomY = 0.8;
                else if (SETTINGS.tf === '5m') state.zoomY = 1.8;
                else state.zoomY = 2.5;
                
                if (state.tfBars[state.tf] && state.tfBars[state.tf].length > 0) {
                    state.bars = state.tfBars[state.tf];
                    recalcProfile(sym);
                } else {
                    await loadHistory(sym);
                }
                
                if(SETTINGS.autoTick && isNewSymbol) {
                    calculateAutoTick(sym);
                    state.baseTick = SETTINGS.tick; // lock it in
                }
                
                if (!state.ws || state.ws.readyState === WebSocket.CLOSED) {
                    await fetchSnapshot(sym); 
                    connectLive(sym);
                }
                document.getElementById('loader').style.display='none';
            }

            // Memory GC deliberately removed
            // The background engine is fully optimized to handle massive amounts of coins without slowing down
            // When returning to BTC or any coin, data stays instantly ready!

            if (!window.loopStarted) { window.loopStarted = true; loop(); }
        }

        function calculateAutoTick(sym) {
            const state = STATES[sym];
            if(!state || !state.bars.length) return;
            const lastN = state.bars.slice(-20);
            let avgRange = 0;
            lastN.forEach(b => avgRange += (b.h - b.l));
            avgRange /= lastN.length;
            if(!avgRange) return;

            const tfMap = { '1m': 2.0, '5m': 4.5, '15m': 8.0, '1h': 15.0 };
            const divisor = tfMap[SETTINGS.tf] || 2.0;
            const rawTick = avgRange / divisor; 

            const cleanTicks = [0.0001, 0.0005, 0.001, 0.005, 0.01, 0.05, 0.1, 0.2, 0.5, 1.0, 2.0, 2.5, 5.0, 10.0, 12.5, 20.0, 25.0, 50.0, 100.0, 250.0, 500.0, 1000.0];
            let bestTick = cleanTicks[0];
            let minDist = Math.abs(rawTick - bestTick);
            for(let t of cleanTicks) {
                let d = Math.abs(rawTick - t);
                if(d < minDist) { minDist = d; bestTick = t; }
            }
            SETTINGS.tick = bestTick;
            document.getElementById('tick-input').value = SETTINGS.tick;
            document.getElementById('auto-tick-btn').classList.add('active');
        }

        async function fetchSnapshot(sym) {
            try {
                const state = STATES[sym];
                const res = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${sym}&limit=1000`);
                const data = await res.json();
                state.orderBook.rawB = {}; state.orderBook.rawA = {};
                data.bids.forEach(b => { state.orderBook.rawB[+b[0]] = +b[1]; });
                data.asks.forEach(a => { state.orderBook.rawA[+a[0]] = +a[1]; });
                processOrderBook(sym);
            } catch(e) { console.error("Snapshot fetch failed", e); }
        }

        function processOrderBook(sym) {
            const state = STATES[sym];
            if (!state) return;
            state.orderBook.b = {}; state.orderBook.a = {};
            let m = 0;
            Object.keys(state.orderBook.rawB).forEach(p => { 
                const tp = Math.round(p/SETTINGS.tick)*SETTINGS.tick; 
                state.orderBook.b[tp] = (state.orderBook.b[tp]||0) + state.orderBook.rawB[p]; 
                if(state.orderBook.b[tp] > m) m = state.orderBook.b[tp];
            });
            Object.keys(state.orderBook.rawA).forEach(p => { 
                const tp = Math.round(p/SETTINGS.tick)*SETTINGS.tick; 
                state.orderBook.a[tp] = (state.orderBook.a[tp]||0) + state.orderBook.rawA[p]; 
                if(state.orderBook.a[tp] > m) m = state.orderBook.a[tp];
            });
            state.orderBook.max = m;
            
            if (SETTINGS.showHeat) {
                const now = Date.now();
                if (!state.lastSnapshot || now - state.lastSnapshot > 5000) {
                    state.heatMap.push({ t: now, b: { ...state.orderBook.b }, a: { ...state.orderBook.a } });
                    if (state.heatMap.length > 300) state.heatMap.shift();
                    state.lastSnapshot = now;
                }
            }
        }

        function updatePresets(sym) {
            const select = document.getElementById('density-select');
            select.innerHTML = '<option value="">-- AGGREGATION --</option>';
            let opts = [];
            const p = STATES[sym] ? STATES[sym].lastP : 0;
            
            if(sym.includes('BTC')) opts = [{l:'X1(5.0)',v:5.0}, {l:'X2(10.0)',v:10.0}, {l:'X5(25.0)',v:25.0}, {l:'X10(50.0)',v:50.0}];
            else if(sym.includes('ETH')) opts = [{l:'X1(0.5)',v:0.5}, {l:'X2(1.0)',v:1.0}, {l:'X4(2.0)',v:2.0}, {l:'X10(5.0)',v:5.0}];
            else if(p > 100) opts = [{l:'X1(0.1)',v:0.1}, {l:'X2(0.2)',v:0.2}, {l:'X5(0.5)',v:0.5}];
            else if(p > 1) opts = [
                {l:'X1(0.001)',v:0.001}, {l:'X2(0.002)',v:0.002}, {l:'X5(0.005)',v:0.005}, 
                {l:'X10(0.01)',v:0.01}, {l:'X20(0.02)',v:0.02}, {l:'X50(0.05)',v:0.05}, {l:'X100(0.1)',v:0.1}
            ];
            else if(p > 0.01) opts = [{l:'X1(0.001)',v:0.001}, {l:'X5(0.005)',v:0.005}, {l:'X10(0.01)',v:0.01}];
            else opts = [{l:'X1(0.0001)',v:0.0001}, {l:'X10(0.001)',v:0.001}];
            
            opts.forEach(o => {
                const opt = document.createElement('option'); opt.value = o.v; opt.textContent = o.l; select.appendChild(opt);
            });
        }

        function resize() {
            w = mainC.width = mainC.parentElement.clientWidth * dpr; h = mainC.height = mainC.parentElement.clientHeight * dpr;
            sw = scaleC.width = scaleC.parentElement.clientWidth * dpr; sh = scaleC.height = scaleC.parentElement.clientHeight * dpr;
            tw = timeC.width = timeC.parentElement.clientWidth * dpr; th = timeC.height = timeC.parentElement.clientHeight * dpr;
            stw = statsC.width = statsC.parentElement.clientWidth * dpr; sth = statsC.height = statsC.parentElement.clientHeight * dpr;
            
            // Set transforms for high-DPI
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            tctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            stctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        async function loadHistory(sym) {
            const state = STATES[sym];
            state.bars = []; state.profile = { v: {}, max: 0, poc: 0 };
            if (!state.tfBars) state.tfBars = {};

            const tfs = ['1m', '5m', '15m', '1h'];
            for (const tf of tfs) {
                if (!state.tfBars[tf] || state.tfBars[tf].length < 1000) {
                    try {
                        const res = await fetch(`https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${tf}&limit=1500`);
                        const data = await res.json();
                        state.tfBars[tf] = data.map(k => {
                            const vol = +k[5], buys = +k[9], sells = vol - buys;
                            return {
                                t:+k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:vol, vAP:{}, max:0, p:0, buys:buys, sells:sells, whales:[], oi:0, liqs:[]
                            };
                        });
                    } catch(e) { console.error(`Failed to load ${tf} history`, e); }
                }
            }
            
            state.bars = state.tfBars[SETTINGS.tf] || [];
            
            // Restore OI from local cache if we polled it previously
            if (state.oiCache.length > 0) {
                state.bars.forEach(b => {
                    const matchedOI = state.oiCache.find(o => o.t >= b.t && o.t < b.t + SETTINGS.tfMs);
                    if (matchedOI) b.oi = matchedOI.oi;
                });
            }
            
            applyCache(sym);
            if (state.bars.length) {
                state.lastP = state.bars[state.bars.length-1].c; 
                state.scrollY = state.lastP; 
                state.scrollX = 0;
                // On mobile use smaller zoomX so 20+ bars are visible
                state.zoomX = window.innerWidth < 768 ? 0.22 : 1.0;
                // Mobile: set zoomY so row height fits nicely
                if (window.innerWidth < 768) state.zoomY = 0.6;
            }
        }

        function applyCache(sym) {
            const state = STATES[sym];
            if(!state.bars.length || !state.tradeCache.length) return;
            const start = state.bars[0].t, end = state.bars[state.bars.length-1].t + SETTINGS.tfMs;
            state.tradeCache.forEach(tr => {
                if(tr.t < start || tr.t >= end) return;
                const bT = Math.floor(tr.t / SETTINGS.tfMs) * SETTINGS.tfMs;
                const b = state.bars.find(x => x.t === bT);
                if(b) {
                    const tp = Math.round(tr.p / SETTINGS.tick) * SETTINGS.tick;
                    b.v += tr.q;
                    if(typeof b.vAP[tp] !== 'object') b.vAP[tp] = { b:0, s:0, t:0 };
                    
                    b.vAP[tp].t += tr.q;
                    if (tr.isSell !== undefined) {
                        if(tr.isSell) { b.vAP[tp].s += tr.q; b.sells += tr.q; }
                        else { b.vAP[tp].b += tr.q; b.buys += tr.q; }
                    }
                    
                    if(b.vAP[tp].t > b.max) { b.max = b.vAP[tp].t; b.p = tp; }
                    state.profile.v[tp] = (state.profile.v[tp] || 0) + tr.q;
                    if(state.profile.v[tp] > state.profile.max) { state.profile.max = state.profile.v[tp]; state.profile.poc = tp; }
                }
            });
        }

        async function connectLive(sym) {
            const state = STATES[sym];
            if (state.ws) state.ws.close();
            const wsSym = sym.toLowerCase();
            state.ws = new WebSocket(`wss://fstream.binance.com/stream?streams=${wsSym}@aggTrade/${wsSym}@depth@100ms/!forceOrder@arr`);
            
            state.ws.onmessage = e => {
                const msg = JSON.parse(e.data);
                const stream = msg.stream;
                const s = STATES[stream.includes('forceOrder') ? msg.data.o.s.toUpperCase() : stream.split('@')[0].toUpperCase()];
                if (!s) return;

                // Mobile Optimization: Buffer messages to prevent UI thread choking
                if (window.innerWidth < 768) {
                    if (!s._msgQueue) s._msgQueue = [];
                    s._msgQueue.push(msg);
                    if (s._msgQueue.length > 200) s._msgQueue.shift(); 
                    return; 
                }
                processWSMessage(msg);
            };

            state.ws.onclose = () => { console.log(`WS Closed for ${sym}. Retrying...`); scheduleReconnect(sym); };
            state.ws.onerror = (e) => { console.error(`WS Error for ${sym}`, e); if(state.ws) state.ws.close(); };
        }

        // --- WebSocket Processing Engine (Global Scope) ---
        function processWSMessage(msg) {
            const stream = msg.stream;
            const d = msg.data;
            const streamSym = stream.includes('forceOrder') ? d.o.s.toUpperCase() : stream.split('@')[0].toUpperCase();
            const s = STATES[streamSym];
            if (!s) return;
            const now = Date.now();
            const isMobile = window.innerWidth < 768;

            if (stream.includes('@aggTrade')) {
                const p = +d.p, q = +d.q, T = d.T, tp = Math.round(p/SETTINGS.tick)*SETTINGS.tick;
                const isSell = d.m; 
                
                s.tradeCache.push({ p, q, t: T, isSell });
                const maxCache = isMobile ? 5000 : 20000;
                if(s.tradeCache.length > maxCache) s.tradeCache.shift();
                
                // Throttled UI updates
                if (streamSym === SETTINGS.symbol && (!s.lastUIUpdate || now - s.lastUIUpdate > 300)) {
                    const hp = document.getElementById('hdr-p'); 
                    if (hp) {
                        hp.innerText = p.toFixed(SETTINGS.tick < 0.01 ? 4 : 2); 
                        hp.className=`price-badge-live ${p>=s.lastP?'up':'dn'}`;
                    }
                    s.lastUIUpdate = now;
                }
                s.lastP = p;

                const tfMsMap = { '1m': 60000, '5m': 300000, '15m': 900000, '1h': 3600000 };
                if (!s.tfBars) s.tfBars = {};
                if (!s.tfBars[s.tf] && s.bars.length) s.tfBars[s.tf] = s.bars;

                const tfsToUpdate = isMobile ? [s.tf] : Object.keys(s.tfBars);
                tfsToUpdate.forEach(tfKey => {
                    const tBars = s.tfBars[tfKey];
                    if (!tBars) return;
                    const bMs = tfMsMap[tfKey] || 60000;
                    const barT = Math.floor(T / bMs) * bMs;
                    
                    let b = tBars[tBars.length-1];
                    if (!b || b.t !== barT) {
                        for (let idx = tBars.length - 2; idx >= Math.max(0, tBars.length - 10); idx--) {
                            if (tBars[idx].t === barT) { b = tBars[idx]; break; }
                        }
                        if (!b || b.t !== barT) {
                            b = { t:barT, o:p, h:p, l:p, c:p, v:0, vAP:{}, max:0, p:tp, buys:0, sells:0, whales:[], oi: tBars[tBars.length-1]?.oi||0, liqs:[] };
                            tBars.push(b); 
                            const maxBars = isMobile ? 200 : 1000;
                            if (tBars.length > maxBars) tBars.shift();
                        }
                    }
                    
                    b.c=p; b.h=Math.max(b.h,p); b.l=Math.min(b.l,p); b.v+=q;
                    if(isSell) b.sells += q; else b.buys += q;
                    
                    if(!b.vAP[tp]) b.vAP[tp] = { b:0, s:0, t:0 };
                    if(isSell) b.vAP[tp].s += q; else b.vAP[tp].b += q;
                    b.vAP[tp].t += q;

                    if (q > SETTINGS.whaleThres) b.whales.push({ p, q, s:isSell });
                    if(b.vAP[tp].t > b.max){ b.max=b.vAP[tp].t; b.p=tp; }
                    
                    if (tfKey === s.tf) {
                        s.profile.v[tp] = (s.profile.v[tp]||0)+q;
                        if(s.profile.v[tp]>s.profile.max) { s.profile.max=s.profile.v[tp]; s.profile.poc=tp; }
                        
                        if (streamSym === SETTINGS.symbol && (!s.lastOHLCUpdate || now - s.lastOHLCUpdate > 500)) {
                            const ohlc = document.getElementById('ohlc-info');
                            if (ohlc) ohlc.innerText = `${new Date(b.t).toLocaleTimeString()} O:${b.o} H:${b.h} L:${b.l} C:${b.c} V:${b.v.toFixed(0)} Δ:${(b.buys-b.sells).toFixed(0)}`;
                            s.lastOHLCUpdate = now;
                        }
                    }
                });
            } 
            else if (stream.includes('@forceOrder')) {
                const o = d.o;
                const lSym = o.s.toUpperCase();
                const targetState = STATES[lSym];
                if (targetState && targetState.bars.length) {
                    const b = targetState.bars[targetState.bars.length-1];
                    b.liqs.push({ p:+o.p, q:+o.q, s:o.S });
                }
            }
            else if (stream.includes('@depth')) {
                d.b.forEach(b => { if (+b[1] === 0) delete s.orderBook.rawB[+b[0]]; else s.orderBook.rawB[+b[0]] = +b[1]; });
                d.a.forEach(a => { if (+a[1] === 0) delete s.orderBook.rawA[+a[0]]; else s.orderBook.rawA[+a[0]] = +a[1]; });
                processOrderBook(streamSym);
            }
        }

        // Mobile Batch Processor (Global Scope)
        setInterval(() => {
            if (window.innerWidth >= 768) return;
            Object.keys(STATES).forEach(sym => {
                const s = STATES[sym];
                if (s._msgQueue && s._msgQueue.length > 0) {
                    const batch = s._msgQueue.splice(0, s._msgQueue.length);
                    batch.forEach(msg => processWSMessage(msg));
                }
            });
        }, 150);

        function scheduleReconnect(sym) {
            const state = STATES[sym];
            if (!state || state.reconnectTimer) return;
            state.reconnectTimer = setTimeout(async () => {
                state.reconnectTimer = null;
                await fetchSnapshot(sym);
                connectLive(sym);
            }, 3000);
        }

        // --- Background Sync & Wake System ---
        let lastVisible = Date.now();
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                const now = Date.now();
                console.log("Tab focused. Awake after", (now - lastVisible) / 1000, "s");
                // If away for more than 10 seconds, re-fetch snapshot to be safe
                if (now - lastVisible > 10000) {
                    const sym = SETTINGS.symbol;
                    const state = STATES[sym];
                    await fetchSnapshot(sym);
                    if (!state || !state.ws || state.ws.readyState !== WebSocket.OPEN) connectLive(sym);
                }
                lastVisible = now;
            } else {
                lastVisible = Date.now();
            }
        });

        // Heartbeat to ensure connection hasn't silently died (Zombies)
        setInterval(() => {
            Object.keys(STATES).forEach(sym => {
                const s = STATES[sym];
                if (!s || !s.ws || s.ws.readyState === WebSocket.CLOSED) scheduleReconnect(sym);
            });
        }, 10000);

        // Data Sync System Removed for performance

        const getSY = p => { const s = STATES[SETTINGS.symbol]; return (h/dpr)/2 - (p - (s?s.scrollY:0)) * (SETTINGS.rowH * (s?s.zoomY:1) / SETTINGS.tick); };
        const getP = y => { const s = STATES[SETTINGS.symbol]; return (s?s.scrollY:0) + ((h/dpr)/2 - y) / (SETTINGS.rowH * (s?s.zoomY:1) / SETTINGS.tick); };
        const getT = x => {
            const s = STATES[SETTINGS.symbol]; if(!s) return Date.now();
            const now = s.bars[s.bars.length-1]?.t || Date.now();
            return now - ((w/dpr) - SETTINGS.domW - 60 - x + s.scrollX) / (SETTINGS.pxMin * s.zoomX) * SETTINGS.tfMs;
        };
        const getSX = t => {
            const s = STATES[SETTINGS.symbol]; if(!s) return 0;
            const now = s.bars[s.bars.length-1]?.t || Date.now();
            return (w/dpr) - SETTINGS.domW - 60 - ((now - t)/SETTINGS.tfMs) * (SETTINGS.pxMin * s.zoomX) + s.scrollX;
        };



        function loop() {
            if (!STATES[SETTINGS.symbol]) { requestAnimationFrame(loop); return; }
            const state = STATES[SETTINGS.symbol];
            const { bars, profile, orderBook, lastP, scrollY, scrollX, zoomX, zoomY, ws, heatMap } = state;
            const cw=w/dpr, ch=h/dpr, rh=SETTINGS.rowH*zoomY, bw=(SETTINGS.pxMin*zoomX)*0.6;
            ctx.fillStyle = THEME.bg; ctx.fillRect(0,0,cw,ch);

            // Calculate current visible max for 'Smart High-Volume Filter'
            let sessionMax = 0;
            const visMin = getP(ch), visMax = getP(0);
            bars.forEach(b => {
                const x = getSX(b.t); if(x+bw/2 < SETTINGS.profW || x-bw/2 > cw-SETTINGS.domW) return;
                Object.values(b.vAP).forEach(v => { if(v > sessionMax) sessionMax = v; });
            });
            if (sessionMax === 0) sessionMax = 1;

            // Grid
            ctx.strokeStyle = THEME.grid; ctx.lineWidth = 1; ctx.beginPath();
            const sPr = Math.floor(getP(ch)/SETTINGS.tick)*SETTINGS.tick, ePr = Math.ceil(getP(0)/SETTINGS.tick)*SETTINGS.tick;
            for(let p=sPr; p<=ePr; p+=SETTINGS.tick*10) { const y = getSY(p); ctx.moveTo(SETTINGS.profW, y); ctx.lineTo(cw-SETTINGS.domW, y); }
            ctx.stroke();

            // Render Drawings
            drawings.forEach(d => {
                ctx.strokeStyle = d.color || THEME.up; ctx.lineWidth = 2;
                if(d.type === 'h-line') {
                    const y = getSY(d.p); ctx.beginPath(); ctx.moveTo(SETTINGS.profW, y); ctx.lineTo(cw-SETTINGS.domW, y); ctx.stroke();
                } else if(d.type === 'box') {
                    const y1 = getSY(d.p1), y2 = getSY(d.p2), x1 = getSX(d.t1), x2 = getSX(d.t2);
                    ctx.fillStyle = d.color.replace(')', ', 0.2)').replace('rgb', 'rgba');
                    ctx.fillRect(x1, y1, x2-x1, y2-y1);
                    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
                }
            });

            // Liquidity Heatmap Rendering (Background)
            if (SETTINGS.showHeat && heatMap.length > 0) {
                heatMap.forEach((snap, idx) => {
                    const x = getSX(snap.t); if (x < SETTINGS.profW || x > cw-SETTINGS.domW) return;
                    const nextX = idx < heatMap.length - 1 ? getSX(heatMap[idx+1].t) : cw-SETTINGS.domW;
                    const w = nextX - x; if (w <= 0) return;

                    Object.keys(snap.b).forEach(p => {
                        const y = getSY(+p); if (y < 0 || y > ch) return;
                        const v = snap.b[p]; const alpha = Math.min(0.2, (v / orderBook.max) * 0.5);
                        ctx.fillStyle = `rgba(16, 185, 129, ${alpha})`; ctx.fillRect(x, y-rh/2, w, rh);
                    });
                    Object.keys(snap.a).forEach(p => {
                        const y = getSY(+p); if (y < 0 || y > ch) return;
                        const v = snap.a[p]; const alpha = Math.min(0.2, (v / orderBook.max) * 0.5);
                        ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`; ctx.fillRect(x, y-rh/2, w, rh);
                    });
                });
            }
            if(isDrawing) {
                ctx.strokeStyle = '#FFF'; ctx.setLineDash([2,2]);

                else if(activeTool === 'box') { const y1 = getSY(startP), y2 = mouseY, x1 = getSX(startT), x2 = mouseX; ctx.strokeRect(x1, y1, x2-x1, y2-y1); }
                ctx.setLineDash([]);
            }

            // Timeline Axis
            tctx.fillStyle = '#090D14'; tctx.fillRect(0,0,tw/dpr,th/dpr);
            tctx.fillStyle = '#94A3B8'; tctx.font = '10px Arial'; tctx.textAlign = 'center';
            bars.forEach((b,i)=>{
                const x = getSX(b.t); if(x < SETTINGS.profW || x > cw-SETTINGS.domW) return;
                ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ch); ctx.stroke();
                if(i%5===0) tctx.fillText(new Date(b.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), x, 22);
            });

            // DOM (Right Order Book)
            ctx.fillStyle = '#080C14'; ctx.fillRect(cw-SETTINGS.domW,0,SETTINGS.domW,ch);
            const drawDOM = (data, color, isAsk) => {
                const maxIntensity = orderBook.max || 1;
                for (const pStr in data) {
                    const p = +pStr;
                    const y = getSY(p); if(y < -20 || y > ch+20) continue;
                    const val = data[pStr];
                    const intensity = val / maxIntensity;
                    const rV = (Math.sqrt(val)/Math.sqrt(maxIntensity))*SETTINGS.domW * 0.9;
                    
                    // --- LIVE GLOWING WALLS ---
                    if (intensity > 0.7 && SETTINGS.showGlowWalls) {
                        ctx.fillStyle = isAsk ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)';
                        ctx.fillRect(SETTINGS.profW, y-rh, (cw-SETTINGS.domW)-SETTINGS.profW, rh*2); 
                        ctx.fillStyle = color; 
                        ctx.fillRect(cw-rV, y-rh/2, rV, rh-0.5);

                    }

                        const txt = val >= 1000000 ? (val/1000000).toFixed(1)+'M' : (val >= 1000 ? (val/1000).toFixed(0)+'K' : val.toFixed(0));

                const isUp = b.c >= b.o;

                // 1. Draw Wick
                ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.beginPath();
                ctx.moveTo(x, syH); ctx.lineTo(x, syL); ctx.stroke();

                    if(bw > 30 && rh > 14) {

                            const sVal = cluster.b >= 1000 ? (cluster.b/1000).toFixed(1)+'k' : cluster.b.toFixed(0);
                            ctx.font = 'bold 10px monospace';
                            ctx.fillStyle = '#EF4444'; // Bids on left (Market Sells) -> Red

        function jumpToTime(targetT) {
            const s = STATES[SETTINGS.symbol]; if(!s || !s.bars.length) return;
            // Find bar closest to targetT
            let closest = s.bars[0];
            let minDist = Math.abs(s.bars[0].t - targetT);
            s.bars.forEach(b => {
                const dist = Math.abs(b.t - targetT);
                if(dist < minDist) { minDist = dist; closest = b; }
            });
            
            // Adjust scrollX so this bar is centered/right
            const now = s.bars[s.bars.length-1].t;
            const barOffset = (now - closest.t) / SETTINGS.tfMs;
            const barWidth = (SETTINGS.pxMin * s.zoomX);
            
            // Equation from getSX: x = (w/dpr) - domW - 60 - ((now - t)/tfMs) * barWidth + scrollX
            // We want x = (w/dpr) / 2 (center)
            s.scrollX = (w/dpr)/2 - ((w/dpr) - SETTINGS.domW - 60 - (barOffset * barWidth));
            s.scrollY = closest.c; // Jump price too
        }

        function drawStatsTable() {
            const state = STATES[SETTINGS.symbol];
            if (!state || !state.bars.length) return;
            const { bars, zoomX, scrollX } = state;
            const cw = stw / dpr, ch = sth / dpr;
            const bw = (SETTINGS.pxMin * zoomX) * 0.6;

            const rowH = ch / 4;
            const labels = ["Ask", "Bid", "Delta", "Volume"];
            const headerW = SETTINGS.profW || 60;

            // Draw Headers
            stctx.fillStyle = '#1F2937';
            stctx.fillRect(0, 0, headerW, ch);
            stctx.strokeStyle = '#374151';
            stctx.lineWidth = 1;
            
            stctx.font = 'bold 10px Inter';
            stctx.textAlign = 'left';
            labels.forEach((label, i) => {
                const y = i * rowH;
                stctx.beginPath();
                stctx.moveTo(0, y);
                stctx.lineTo(headerW, y);
                stctx.stroke();
                stctx.fillStyle = '#9CA3AF';
                stctx.fillText(label, 10, y + rowH/2 + 4);
            });

            // Draw Cells for each candle
            bars.forEach(b => {
                const x = getSX(b.t);
                if (x + bw/2 < headerW || x - bw/2 > cw - SETTINGS.domW) return;

                const ask = b.buys;
                const bid = b.sells;
                const delta = ask - bid;
                const vol = b.v;
                const isBull = delta >= 0;
                
                // Ask Row (Market Buys) - Always Green
                stctx.fillStyle = 'rgba(16, 185, 129, 0.15)';
                stctx.fillRect(x - bw/2, 0, bw, rowH);
                stctx.fillStyle = '#10B981';
                stctx.font = '10px Roboto Mono';
                stctx.textAlign = 'center';
                stctx.fillText(formatVal(ask), x, rowH/2 + 4);

                // Bid Row (Market Sells) - Always Red
                stctx.fillStyle = 'rgba(239, 68, 68, 0.15)';
                stctx.fillRect(x - bw/2, rowH, bw, rowH);
                stctx.fillStyle = '#EF4444';
                stctx.fillText(formatVal(bid), x, rowH + rowH/2 + 4);

                // Delta Row - Dynamic color
                stctx.fillStyle = isBull ? 'rgba(16, 185, 129, 0.35)' : 'rgba(239, 68, 68, 0.35)';
                stctx.fillRect(x - bw/2, rowH * 2, bw, rowH);
                stctx.fillStyle = '#FFF';
                stctx.fillText(formatVal(delta), x, rowH * 2 + rowH/2 + 4);

                // Volume Row
                stctx.fillStyle = 'rgba(55, 65, 81, 0.3)';
                stctx.fillRect(x - bw/2, rowH * 3, bw, rowH);
                stctx.fillStyle = '#D1D5DB';
                stctx.fillText(formatVal(vol), x, rowH * 3 + rowH/2 + 4);

                stctx.strokeStyle = 'rgba(255,255,255,0.05)';

                stctx.moveTo(x - bw/2, 0);
                stctx.lineTo(x - bw/2, ch);
                stctx.stroke();

            function formatVal(v) {
                const absV = Math.abs(v);
                if (absV >= 1000000) return (v / 1000000).toFixed(1) + 'M';
                if (absV >= 1000) return (v / 1000).toFixed(1) + 'k';
                return v.toFixed(0);
            }
        }

        let touchPrevX = 0, touchPrevY = 0;

        let pinchStartCenterX = 0, pinchStartCenterY = 0;
        let isPinching = false;
        let touchVelX = 0, touchVelY = 0;

        function cancelInertia() {
            if (inertiaRAF) { cancelAnimationFrame(inertiaRAF); inertiaRAF = null; }
        }

        function startInertia() {
            cancelInertia();
            const s = STATES[SETTINGS.symbol]; if (!s) return;
            function step() {
                touchVelX *= 0.88; touchVelY *= 0.88;
                if (Math.abs(touchVelX) < 0.3 && Math.abs(touchVelY) < 0.3) { inertiaRAF = null; return; }
                s.scrollX += touchVelX;
                s.scrollY += touchVelY * (SETTINGS.tick / (SETTINGS.rowH * s.zoomY));
                inertiaRAF = requestAnimationFrame(step);
            }
            inertiaRAF = requestAnimationFrame(step);
        }

        mainC.addEventListener('touchstart', e => {
            e.preventDefault();
            cancelInertia();
            touchVelX = 0; touchVelY = 0;
            const s = STATES[SETTINGS.symbol]; if (!s) return;

            if (e.touches.length === 1) {
                isPinching = false;
                touchPrevX = e.touches[0].clientX;
                touchPrevY = e.touches[0].clientY;
                // Long press shows crosshair
                longPressTmr = setTimeout(() => {
                    const rect = mainC.getBoundingClientRect();

                pinchStartDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                pinchStartZoomX = s.zoomX;
                pinchStartZoomY = s.zoomY;
                pinchStartCenterX = (t1.clientX + t2.clientX) / 2;
                pinchStartCenterY = (t1.clientY + t2.clientY) / 2;
                touchPrevX = pinchStartCenterX;
                touchPrevY = pinchStartCenterY;
            }
        }, { passive: false });

        mainC.addEventListener('touchmove', e => {
            e.preventDefault();
            const s = STATES[SETTINGS.symbol]; if (!s) return;

            if (e.touches.length === 1 && !isPinching) {
                clearTimeout(longPressTmr);
                const cx = e.touches[0].clientX;
                const cy = e.touches[0].clientY;
                const dx = cx - touchPrevX;
                const dy = cy - touchPrevY;
                // Smooth delta accumulation - same pattern as mouse handler
                s.scrollX += dx;
                s.scrollY += dy * (SETTINGS.tick / (SETTINGS.rowH * s.zoomY));
                // Store velocity for inertia
                touchVelX = dx * 0.6 + touchVelX * 0.4;
                touchVelY = dy * 0.6 + touchVelY * 0.4;
                touchPrevX = cx;
                touchPrevY = cy;

            } else if (e.touches.length === 2) {
                const t1 = e.touches[0], t2 = e.touches[1];
                const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                const scale = dist / pinchStartDist;
                // Detect axis: wider spread = horizontal zoom, taller = vertical zoom
                const spanX = Math.abs(t2.clientX - t1.clientX);
                const spanY = Math.abs(t2.clientY - t1.clientY);
                if (spanX > spanY) {
                    s.zoomX = Math.max(0.15, Math.min(12, pinchStartZoomX * scale));
                } else {
                    s.zoomY = Math.max(0.15, Math.min(12, pinchStartZoomY * scale));
                }
                // Also allow panning during pinch (center movement)
                const cx = (t1.clientX + t2.clientX) / 2;
                const cy = (t1.clientY + t2.clientY) / 2;
                s.scrollX += cx - touchPrevX;
                s.scrollY += (cy - touchPrevY) * (SETTINGS.tick / (SETTINGS.rowH * s.zoomY));
                touchPrevX = cx;
                touchPrevY = cy;
            }
        }, { passive: false });

        mainC.addEventListener('touchend', e => {
            clearTimeout(longPressTmr);
            if (e.touches.length === 0) {
                isPinching = false;
                startInertia(); // Momentum scroll
            } else if (e.touches.length === 1) {
                isPinching = false;
                touchPrevX = e.touches[0].clientX;
                touchPrevY = e.touches[0].clientY;
                touchVelX = 0; touchVelY = 0;
            }
        }, { passive: false });

        // Prevent page scroll when touching canvas
        document.body.addEventListener('touchmove', e => {
            if (e.target === mainC) e.preventDefault();
        }, { passive: false });

        // ===== MOBILE BOTTOM SHEET FUNCTIONS =====
        let currentSheet = 'ind';
        function openSheet(tab) {
            currentSheet = tab;
            ['ind','tf','sym'].forEach(t => {
                document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
            });
            const titles = { ind: 'INDICATORS', tf: 'TIMEFRAME', sym: 'SYMBOL' };
            document.getElementById('sheet-title').textContent = titles[tab] || 'MENU';
            document.getElementById('bottom-sheet').classList.add('open');
            document.getElementById('sheet-overlay').style.display = 'block';
        }
        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('open');
            document.getElementById('sheet-overlay').style.display = 'none';
            document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('bnav-chart').classList.add('active');
        }
        function switchTab(tab) {
            if (tab === 'chart') { closeSheet(); }
            else { openSheet(tab); }
        }
        function sheetToggle(settingKey, btnId, el) {
            SETTINGS[settingKey] = !SETTINGS[settingKey];
            el.classList.toggle('on', SETTINGS[settingKey]);
            const btn = document.getElementById(btnId);
            if (btn) { if (SETTINGS[settingKey]) btn.classList.add('active'); else btn.classList.remove('active'); }
        }
        function setMobileTF(tf, el) {
            document.querySelectorAll('#tab-tf .sheet-tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            SETTINGS.tf = tf;
            const map = { '1m':60000, '5m':300000, '15m':900000, '1h':3600000 };
            SETTINGS.tfMs = map[tf];
            SETTINGS.stackedZones = [];
            document.getElementById('tf-select').value = tf;
            init(SETTINGS.symbol, SETTINGS.tick);
            setTimeout(closeSheet, 350);
        }
        function quickSym(sym) {
            closeSheet();
            setTimeout(() => init(sym, null), 200);
        }
        function changeMobileSymbol() {
            const val = document.getElementById('mobile-sym-input').value.trim().toUpperCase();
            if (val) { closeSheet(); setTimeout(() => init(val, null), 200); }
        }
        // Swipe-down-to-close sheet
        let sheetSwipeStartY = 0;
        document.getElementById('bottom-sheet').addEventListener('touchstart', e => {
            sheetSwipeStartY = e.touches[0].clientY;
        }, { passive: true });
        document.getElementById('bottom-sheet').addEventListener('touchend', e => {
            if (e.changedTouches[0].clientY - sheetSwipeStartY > 70) closeSheet();
        }, { passive: true });

        // ===== MOBILE LAYOUT SETTINGS =====
        if (window.innerWidth < 768) {
            SETTINGS.showOIPanel   = false;
            SETTINGS.showVSpdPanel = false;
            SETTINGS.showTFHeatmap = false;
            SETTINGS.showStats     = false;
            SETTINGS.showOI        = false;
            SETTINGS.showCVD       = false;
            SETTINGS.showDOI       = false;
            SETTINGS.showLiq       = false;
            SETTINGS.showTrend     = false;
            SETTINGS.showTIndex    = false;
            SETTINGS.showGlowWalls = false;
            SETTINGS.showImb       = false;
            SETTINGS.showStk       = false;
            SETTINGS.profW         = 0;       // No left volume profile → full chart width
            SETTINGS.domW          = 60;      // Narrow right DOM
            SETTINGS.pxMin         = 120;     // Keep pxMin, control via zoomX only
            SETTINGS.rowH          = 20;      // Smaller row height for mobile
        }

        init();
    </script>
</body>
</html>
